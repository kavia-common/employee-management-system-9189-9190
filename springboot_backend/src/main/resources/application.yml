server:
  port: ${PORT:3001}
  address: ${HOST:0.0.0.0}

spring:
  application:
    name: employee-management-backend

  datasource:
    # NOTE: These must be provided via environment variables at deployment/runtime.
    # They are intentionally not hard-coded and may be wired during "Final Integration" plan step.
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
    allowed-methods: ${ALLOWED_METHODS:GET,POST,PUT,DELETE,PATCH,OPTIONS}
    allowed-headers: ${ALLOWED_HEADERS:Content-Type,Authorization,X-Requested-With}
    max-age: ${CORS_MAX_AGE:3600}
